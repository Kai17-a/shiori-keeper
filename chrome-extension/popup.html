<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Bookmark Manager</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <main class="popup">
            <section class="frame">
                <header class="topbar">
                    <div class="brand">
                        <div class="brand-mark">B</div>
                        <div>
                            <h1>Bookmark Manager</h1>
                        </div>
                    </div>

                    <button
                        class="icon-button"
                        type="button"
                        aria-label="Use active tab"
                    >
                        ↗
                    </button>
                </header>

                <section class="panel panel--accent">
                    <label class="field">
                        <span>API Server URL</span>
                        <div class="row">
                            <input
                                type="url"
                                placeholder="http://localhost:8080"
                            />
                            <button class="button button--ghost" type="button">
                                Test
                            </button>
                        </div>
                    </label>
                    <div class="hint">
                        <span class="dot dot--success"></span>
                        Connected to API
                    </div>
                </section>

                <section class="panel">
                    <div class="stack">
                        <label class="field">
                            <span>Title</span>
                            <input type="text" placeholder="Page title" />
                        </label>

                        <label class="field">
                            <span>URL</span>
                            <input
                                type="url"
                                placeholder="https://example.com"
                            />
                        </label>

                        <label class="field">
                            <span>Note</span>
                            <textarea
                                rows="3"
                                placeholder="Short note"
                            ></textarea>
                        </label>

                        <div class="split">
                            <label class="field">
                                <span>Folder</span>
                                <select>
                                    <option>Choose folder</option>
                                    <option>Reading</option>
                                    <option>Work</option>
                                    <option>Research</option>
                                </select>
                            </label>

                            <label class="field">
                                <span>Tag</span>
                                <select>
                                    <option>Choose tag</option>
                                    <option>Important</option>
                                    <option>Later</option>
                                    <option>Reference</option>
                                </select>
                            </label>
                        </div>

                        <label class="field">
                            <span>API Server URL</span>
                            <input
                                type="url"
                                placeholder="http://localhost:8080"
                            />
                        </label>
                    </div>
                </section>

                <footer class="actions">
                    <button class="button button--ghost" type="button">
                        Cancel
                    </button>
                    <button class="button button--primary" type="button">
                        Save
                    </button>
                </footer>
            </section>
        </main>
    </body>
</html>
