<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shiori Keeper</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="frame">
        <header class="topbar">
          <div class="brand">
            <!--<div class="brand-mark">B</div>-->
            <div>
              <h1>Shiori Keeper</h1>
            </div>
          </div>
        </header>

        <section class="panel panel--accent">
          <label class="field">
            <span>API Server URL</span>
            <div class="row">
              <input
                id="api-server-url"
                type="url"
                value="http://localhost:8000"
                placeholder="http://localhost:8000"
              />
              <button id="api-healthcheck-button" class="button button--ghost" type="button">
                Test
              </button>
            </div>
          </label>
          <div class="hint">
            <span id="api-status-dot" class="dot dot--pending"></span>
            <span id="api-status-message">Connecting to API...</span>
          </div>
        </section>

        <section class="panel">
          <div class="stack">
            <label class="field">
              <span>Title</span>
              <input id="page-title" type="text" placeholder="Page title" />
            </label>

            <label class="field">
              <span>URL</span>
              <input id="page-url" type="url" placeholder="https://example.com" />
            </label>

            <label class="field">
              <span>Description</span>
              <textarea rows="3" placeholder="Short note"></textarea>
            </label>

            <div class="split">
              <label class="field">
                <span>Folder</span>
                <select id="folder-select">
                  <option value="">-- Select Folder --</option>
                </select>
              </label>

              <label class="field">
                <span>Tag</span>
                <select id="tag-select">
                  <option value="">-- Select Tag --</option>
                </select>
              </label>
            </div>
          </div>
        </section>

        <footer class="actions">
          <span id="save-status-message" class="save-status"></span>
          <button id="cancel-button" class="button button--ghost" type="button">Cancel</button>
          <button id="save-button" class="button button--primary" type="button">Save</button>
        </footer>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
