services:
  bookmark-manager:
    container_name: bookmark-manager
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: /data/bookmark.db
      API_BASE_URL: http://127.0.0.1:8005
    ports:
      - "3001:3000"
      - "8005:8000"
    volumes:
      - ./data:/data
