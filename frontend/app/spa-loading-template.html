<div class="shiori-spa-loader" role="status" aria-live="polite">
  <style>
    .shiori-spa-loader {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.14), transparent 28rem),
        radial-gradient(circle at 80% 10%, rgba(34, 197, 94, 0.12), transparent 24rem),
        #f8fafc;
      color: #0f172a;
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .shiori-spa-loader__card {
      width: min(24rem, calc(100vw - 3rem));
      border: 1px solid rgba(15, 23, 42, 0.1);
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      padding: 1.25rem;
    }

    .shiori-spa-loader__brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .shiori-spa-loader__mark {
      width: 0.8rem;
      height: 1.5rem;
      border-radius: 999px 999px 0.2rem 0.2rem;
      background: linear-gradient(180deg, #0284c7, #16a34a);
      animation: shiori-loader-pulse 900ms ease-in-out infinite alternate;
    }

    .shiori-spa-loader__line {
      height: 0.7rem;
      margin-top: 1rem;
      border-radius: 999px;
      background: linear-gradient(90deg, #e2e8f0, #f8fafc, #e2e8f0);
      background-size: 220% 100%;
      animation: shiori-loader-sweep 1.2s ease-in-out infinite;
    }

    .shiori-spa-loader__line:nth-child(3) {
      width: 72%;
    }

    .shiori-spa-loader__text {
      margin: 1rem 0 0;
      color: #64748b;
      font-size: 0.875rem;
    }

    @media (prefers-color-scheme: dark) {
      .shiori-spa-loader {
        background:
          radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.16), transparent 28rem),
          radial-gradient(circle at 80% 10%, rgba(74, 222, 128, 0.12), transparent 24rem),
          #020617;
        color: #e2e8f0;
      }

      .shiori-spa-loader__card {
        border-color: rgba(226, 232, 240, 0.12);
        background: rgba(15, 23, 42, 0.84);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      }

      .shiori-spa-loader__line {
        background: linear-gradient(90deg, #1e293b, #334155, #1e293b);
        background-size: 220% 100%;
      }

      .shiori-spa-loader__text {
        color: #94a3b8;
      }
    }

    @keyframes shiori-loader-pulse {
      from {
        transform: translateY(0);
        opacity: 0.75;
      }

      to {
        transform: translateY(-0.25rem);
        opacity: 1;
      }
    }

    @keyframes shiori-loader-sweep {
      from {
        background-position: 120% 0;
      }

      to {
        background-position: -120% 0;
      }
    }
  </style>
  <div class="shiori-spa-loader__card">
    <div class="shiori-spa-loader__brand">
      <span class="shiori-spa-loader__mark"></span>
      <span>Shiori Keeper</span>
    </div>
    <div class="shiori-spa-loader__line"></div>
    <div class="shiori-spa-loader__line"></div>
    <p class="shiori-spa-loader__text">Preparing your bookmarks...</p>
  </div>
</div>
