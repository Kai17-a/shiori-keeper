name: PR Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  commit-messages:
    if: github.event_name == 'push' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify commit messages
        run: |
          base_ref="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base_ref" ] || [ "$base_ref" = "0000000000000000000000000000000000000000" ]; then
            base_ref="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi
          merge_base="$(git merge-base "$base_ref" HEAD)"
          git log --no-merges --format=%s "$merge_base..HEAD" | while IFS= read -r subject; do
            printf '%s\n' "$subject" | grep -Eq '^(feat|fix|docs|test|refactor|chore|revert)(\([a-z0-9-]+\))?: .+'
          done

  api:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Restore API virtualenv cache
        id: api-cache
        uses: actions/cache@v5
        with:
          path: api/.venv
          key: api-venv-${{ runner.os }}-${{ hashFiles('api/pyproject.toml', 'api/uv.lock') }}

      - name: Sync API environment
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: uv sync --directory api --frozen

      - name: Run API lint
        run: uv run --directory api ruff check .

      - name: Run API tests
        run: uv run --directory api pytest -q

  frontend-unit:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Restore frontend dependency cache
        id: frontend-cache
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-${{ hashFiles('frontend/package.json', 'frontend/bun.lock') }}

      - name: Install frontend dependencies
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bun install

      - name: Prepare frontend Nuxt artifacts
        working-directory: frontend
        run: bun run prepare

      - name: Run frontend unit tests
        working-directory: frontend
        run: bun run test

  frontend-e2e:
    runs-on: ubuntu-latest
    needs:
      - api
      - frontend-unit

    defaults:
      run:
        shell: bash

    env:
      PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:8000
      PLAYWRIGHT_FRONTEND_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Restore API virtualenv cache
        id: api-cache
        uses: actions/cache@v5
        with:
          path: api/.venv
          key: api-venv-${{ runner.os }}-${{ hashFiles('api/pyproject.toml', 'api/uv.lock') }}

      - name: Restore frontend dependency cache
        id: frontend-cache
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-${{ hashFiles('frontend/package.json', 'frontend/bun.lock') }}

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('frontend/package.json', 'frontend/bun.lock') }}

      - name: Sync API environment
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: uv sync --directory api --frozen

      - name: Install frontend dependencies
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bun install

      - name: Prepare frontend Nuxt artifacts
        working-directory: frontend
        run: bun run prepare

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: ./scripts/run-e2e-tests.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-tests-logs
          path: |
            /tmp/api.log
            /tmp/frontend.log
            /tmp/bookmark-manager-api-e2e.log
            /tmp/bookmark-manager-frontend-e2e.log
