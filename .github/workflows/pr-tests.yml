name: PR Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Restore API virtualenv cache
        id: api-cache
        uses: actions/cache@v5
        with:
          path: api/.venv
          key: api-venv-${{ runner.os }}-${{ hashFiles('api/pyproject.toml', 'api/uv.lock') }}

      - name: Sync API environment
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: uv sync --directory api --frozen

      - name: Run API lint
        run: uv run --directory api ruff check .

      - name: Run API tests
        run: uv run --directory api pytest -q

  frontend-unit:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Restore frontend dependency cache
        id: frontend-cache
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-${{ hashFiles('frontend/package.json', 'frontend/bun.lock') }}

      - name: Install frontend dependencies
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bun install

      - name: Prepare frontend Nuxt artifacts
        working-directory: frontend
        run: bun run prepare

      - name: Run frontend unit tests
        working-directory: frontend
        run: bun run test

  batch:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            batch/target
          key: batch-cargo-${{ runner.os }}-${{ hashFiles('batch/Cargo.lock', 'batch/Cargo.toml') }}
          restore-keys: |
            batch-cargo-${{ runner.os }}-

      - name: Run cargo check
        working-directory: batch
        run: cargo check

      - name: Run cargo test
        working-directory: batch
        run: cargo test

  frontend-e2e:
    runs-on: ubuntu-latest
    needs:
      - api
      - frontend-unit

    defaults:
      run:
        shell: bash

    env:
      PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:8000
      PLAYWRIGHT_FRONTEND_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Restore API virtualenv cache
        id: api-cache
        uses: actions/cache@v5
        with:
          path: api/.venv
          key: api-venv-${{ runner.os }}-${{ hashFiles('api/pyproject.toml', 'api/uv.lock') }}

      - name: Restore frontend dependency cache
        id: frontend-cache
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-${{ hashFiles('frontend/package.json', 'frontend/bun.lock') }}

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('frontend/package.json', 'frontend/bun.lock') }}

      - name: Sync API environment
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: uv sync --directory api --frozen

      - name: Install frontend dependencies
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bun install

      - name: Prepare frontend Nuxt artifacts
        working-directory: frontend
        run: bun run prepare

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run E2E tests
        run: ./scripts/run-e2e-tests.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-tests-logs
          path: |
            /tmp/api.log
            /tmp/frontend.log
            /tmp/bookmark-manager-api-e2e.log
            /tmp/bookmark-manager-frontend-e2e.log
