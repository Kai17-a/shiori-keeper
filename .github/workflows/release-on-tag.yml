name: Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Configure git-cliff repository context
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate changelog
        id: generate-changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          git-cliff --output CHANGELOG.md
          git-cliff --latest --strip header --output RELEASE_CHANGELOG.md
          {
            echo "tag=${TAG_NAME}"
            echo "notes_path=RELEASE_CHANGELOG.md"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.generate-changelog.outputs.tag }}" \
            --title "${{ steps.generate-changelog.outputs.tag }}" \
            --notes-file "${{ steps.generate-changelog.outputs.notes_path }}"
